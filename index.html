<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <title>Feliz Cumpleaños</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="mobile.css"
      media="only screen and (max-width: 768px)"
    />
  </head>
  <body>
    <!--Confeti Atras-->
    <canvas id="canvas1"></canvas>

    <div class="contenedor">
      <!-- PortaRetrato -->
      <div class="portaretrato-torta-caja">

  <!-- Portarretrato Izquierdo -->
  <div class="portaretrato">
    <div class="marco">
      <img src="/proyectos/Feliz Cumpleaños/recursos/cumpleañero.png" alt="Foto">
    </div>
    <div class="soporte-marco"></div>
  </div>

  <!-- Regalo Izquierdo -->
  <div class="caja-wrapper regalo-extra izquierda">
    <div class="caja">
      <div class="cinta-de-regalo">
        <div class="cinta-de-regalo-izquierda"></div>
        <div class="cinta-de-regalo-derecha"></div>
        <div class="cinta-de-regalo-centro"></div>
      </div>
      <div class="regalos">
        <div class="regalo-sombra"></div>
      </div>
      <div class="regalo"></div>
    </div>
  </div>

  <!-- TORTA CENTRO -->
  <div class="torta-cumpleaños">
    <div class="torta">
      <div class="chocolate"></div>
    </div>
    <div class="vela"></div>
    <div class="llama"></div>
  </div>

  <!-- Regalo Centro -->
  <div class="caja-wrapper">
    <div class="caja">
      <div class="cinta-de-regalo">
        <div class="cinta-de-regalo-izquierda"></div>
        <div class="cinta-de-regalo-derecha"></div>
        <div class="cinta-de-regalo-centro"></div>
      </div>
      <div class="regalos">
        <div class="regalo-sombra"></div>
      </div>
      <div class="regalo"></div>
    </div>
  </div>

  <!-- Regalo Derecho -->
  <div class="caja-wrapper regalo-extra derecha">
    <div class="caja">
      <div class="cinta-de-regalo">
        <div class="cinta-de-regalo-izquierda"></div>
        <div class="cinta-de-regalo-derecha"></div>
        <div class="cinta-de-regalo-centro"></div>
      </div>
      <div class="regalos">
        <div class="regalo-sombra"></div>
      </div>
      <div class="regalo"></div>
    </div>
  </div>

  <!-- Portarretrato Derecho -->
  <div class="portaretrato">
    <div class="marco">
      <img src="/proyectos/Feliz Cumpleaños/recursos/cumpleañero.png" alt="Foto">
    </div>
    <div class="soporte-marco"></div>
  </div>

</div>
        <!--Mensaje Feliz Cumpleaños-->
        <div class="happy-birthday">Happy Birthday</div>
      </div>

      <!--Mesa-->
      <div class="soporte"></div>
    </div>

    <!-- Carta Modal -->
    <div class="modal-carta" id="modalCarta">
      <div class="contenido-carta">
        <div class="carta">
          <h2>Querido(a) [Nombre]</h2>
          <p>
            En este día tan especial quiero desearte un feliz cumpleaños lleno
            de alegría, risas y momentos inolvidables. 🎂✨
          </p>
          <p class="firma">Con cariño,<br />Tu Novio(a)</p>
        </div>
      </div>
    </div>

    <!--Confeti Delante-->
    <canvas id="canvas2"></canvas>

    <!--Todo Oscuro-->
    <audio id="soplido" src="/proyectos/Feliz Cumpleaños/recursos/soplar1.mp3" preload="auto"></audio>
    <audio
      id="cancion"
      src="/proyectos/Feliz Cumpleaños/recursos/cancion.mp3"
      preload="auto"
    ></audio>
    <div class="overlay"></div>

    <script src="Confeti.js"></script>
    <script src="Confeti2.js"></script>
    <script src="Sorpresa.js"></script>
  </body>
</html>
