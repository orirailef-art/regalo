<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet"/>
<title>Feliz Cumpleaños</title>
<link rel="stylesheet" href="styles.css"/>
</head>

<body>

<canvas id="canvas1"></canvas>

<div class="contenedor">

    <div class="happy-birthday">Feliz Cumpleaños</div>

    <div class="escena">

        <!-- izquierda -->
        <div class="portaretrato">
            <div class="marco"><img src="otra_foto.png"></div>
            <div class="soporte-marco"></div>
        </div>

        <div class="caja-wrapper regaloA">
            <div class="caja">
                <div class="regalos giftA"></div>
                <div class="regalo giftA"></div>
            </div>
        </div>

        <!-- centro -->
        <div class="torta-cumpleaños">
            <div class="torta"></div>
            <div class="vela"></div>
            <div class="llama"></div>
        </div>

        <!-- derecha -->
        <div class="caja-wrapper regaloB">
            <div class="caja">
                <div class="regalos giftB"></div>
                <div class="regalo giftB"></div>
            </div>
        </div>

        <div class="portaretrato">
            <div class="marco"><img src="cumplañero.png"></div>
            <div class="soporte-marco"></div>
        </div>

    </div>

    <div class="mesa"></div>
    <div class="pata"></div>

</div>

<!-- Carta A -->
<div class="modal-carta" id="modalA">
    <div class="carta">
        <h2>Nico</h2>
        <p>Esta es la Carta A 💛</p>
    </div>
</div>

<!-- Carta B -->
<div class="modal-carta" id="modalB">
    <div class="carta">
        <h2>Sorpresa</h2>
        <p>Esta es la Carta B 🎁</p>
    </div>
</div>

<audio id="soplido" src="soplar1.mp3"></audio>
<audio id="cancion" src="cancion.mp3"></audio>

<div class="overlay"></div>

<script src="Sorpresa.js"></script>
</body>
</html>
