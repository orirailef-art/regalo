<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Acceso</title>

<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: #00ff9c;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    #terminal {
        width: 400px;
        max-width: 90%;
    }

    #text {
        min-height: 120px;
        white-space: pre-line;
    }

    .bar-container {
        width: 100%;
        height: 10px;
        background: #222;
        margin-top: 20px;
        border-radius: 5px;
        overflow: hidden;
    }

    .bar {
        height: 100%;
        width: 0%;
        background: #00ff9c;
        transition: width 0.3s;
    }

    #card {
        display: none;
        margin-top: 30px;
        background: #111;
        border: 1px solid #00ff9c;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        animation: fadeIn 1s ease forwards;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        background: #00ff9c;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: scale(0.9);}
        to {opacity: 1; transform: scale(1);}
    }
</style>
</head>

<body>

<div id="terminal">
    <div id="text"></div>

    <div class="bar-container">
        <div class="bar" id="bar"></div>
    </div>
</div>

<div id="card">
    <h2>🎉 ACCESO CONCEDIDO 🎉</h2>
    <p>Usuario validado correctamente</p>
    <h1>🍔 Hamburguesa todo pago 🍔</h1>
    <p>Invita: TU NOMBRE</p>
    <button onclick="alert('Coordinamos cuándo vamos 😎')">Reclamar</button>
</div>

<script>
const mensajes = [
    "Iniciando sistema...",
    "Cargando módulos...",
    "Detectando usuario...",
    "Validando credenciales...",
    "Acceso autorizado"
];

const text = document.getElementById("text");
const bar = document.getElementById("bar");

let i = 0;
let progreso = 0;

function escribirLinea(linea, callback) {
    let j = 0;
    function escribir() {
        if (j < linea.length) {
            text.innerHTML += linea[j];
            j++;
            setTimeout(escribir, 30);
        } else {
            text.innerHTML += "\n";
            callback();
        }
    }
    escribir();
}

function siguienteMensaje() {
    if (i < mensajes.length) {
        escribirLinea(mensajes[i], () => {
            i++;
            progreso += 20;
            bar.style.width = progreso + "%";
            setTimeout(siguienteMensaje, 500);
        });
    } else {
        setTimeout(() => {
            document.getElementById("card").style.display = "block";
        }, 800);
    }
}

siguienteMensaje();
</script>

</body>
</html>
