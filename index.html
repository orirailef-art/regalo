<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet"/>

  <title>Feliz Cumpleaños</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Confeti atrás -->
  <canvas id="canvas1"></canvas>

  <div class="contenedor">

    <div class="portaretrato-torta-caja">

      <!-- Foto -->
      <div class="portaretrato">
        <div class="marco">
          <img src="cumplañero.png" alt="Foto" />
        </div>
        <div class="soporte-marco"></div>
      </div>

      <!-- Torta -->
      <div class="torta-cumpleaños">
        <div class="torta">
          <div class="chocolate"></div>
        </div>
        <div class="vela"></div>
        <div class="llama"></div>
      </div>

      <!-- Cajas -->
      <div class="cajas">

        <!-- Caja 1 -->
        <div class="caja-wrapper">
          <div class="caja">
            <div class="cinta-de-regalo">
              <div class="cinta-de-regalo-izquierda"></div>
              <div class="cinta-de-regalo-derecha"></div>
              <div class="cinta-de-regalo-centro"></div>
            </div>

            <div class="regalos">
              <div class="regalo-sombra"></div>
            </div>

            <div class="regalo"></div>

            <div class="icono-estrella estrella1"></div>
            <div class="icono-estrella estrella2"></div>
            <div class="icono-estrella estrella3"></div>
            <div class="icono-estrella estrella4"></div>
            <div class="icono-estrella estrella5"></div>
          </div>
        </div>

        <!-- Caja 2 -->
        <div class="caja-wrapper">
          <div class="caja">
            <div class="cinta-de-regalo">
              <div class="cinta-de-regalo-izquierda"></div>
              <div class="cinta-de-regalo-derecha"></div>
              <div class="cinta-de-regalo-centro"></div>
            </div>

            <div class="regalos">
              <div class="regalo-sombra"></div>
            </div>

            <div class="regalo"></div>

            <div class="icono-estrella estrella1"></div>
            <div class="icono-estrella estrella2"></div>
            <div class="icono-estrella estrella3"></div>
            <div class="icono-estrella estrella4"></div>
            <div class="icono-estrella estrella5"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Texto -->
    <div class="happy-birthday">Feliz Cumpleaños</div>

    <!-- Mesa -->
    <div class="soporte"></div>

  </div>

  <!-- Modal Carta -->
  <div class="modal-carta" id="modalCarta1">
    <div class="contenido-carta">
      <div class="carta">
        <h2>Nico</h2>
        <p>Feliz cumple crack 🎉</p>
        <p class="firma">Ori</p>
      </div>
    </div>
  </div>

  <!-- Confeti delante -->
  <canvas id="canvas2"></canvas>

</body>
</html>
